<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #08080d; --gold: #e8a920; --gold-dim: #a87718;
    --gold-light: #f4c257; --text: #f0f0f8; --text-dim: #8a8a95;
    --border: rgba(232, 169, 32, 0.15);
    --border-bright: rgba(232, 169, 32, 0.35);
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Fraunces', Georgia, serif; font-weight: 300;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    display: flex; flex-direction: column; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(232, 169, 32, 0.12) 0%, transparent 60%);
    filter: blur(60px); pointer-events: none; z-index: 0;
  }
  nav {
    padding: 24px 60px; display: flex; justify-content: space-between;
    align-items: center; border-bottom: 1px solid var(--border);
    position: relative; z-index: 10;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Instrument Serif', serif; font-size: 22px;
    text-decoration: none; color: var(--text);
  }
  .logo-mark {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, #f4c257 0%, #e8a920 40%, #a87718 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(232, 169, 32, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .logo-mark svg { width: 20px; height: 20px; fill: #fff; }

  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 80px 60px; text-align: center; position: relative; z-index: 1;
  }
  .content {
    max-width: 640px; animation: fadeUp 1s ease-out;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .big-number {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(120px, 25vw, 280px);
    line-height: 1; letter-spacing: -0.05em;
    background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-style: italic;
    margin-bottom: 24px;
    position: relative;
  }

  .musical-rest {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.3em; color: var(--gold);
    margin-bottom: 16px;
    display: flex; align-items: center; justify-content: center;
    gap: 16px;
  }
  .musical-rest::before, .musical-rest::after {
    content: ''; width: 40px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(32px, 5vw, 48px);
    line-height: 1.1; letter-spacing: -0.02em;
    margin-bottom: 24px;
  }
  h1 .italic { font-style: italic; color: var(--gold); }

  p {
    color: var(--text-dim); font-size: 17px;
    line-height: 1.7; margin-bottom: 40px;
  }

  .actions {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  }
  .btn-primary {
    padding: 16px 36px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
    color: var(--bg); border: none; border-radius: 100px;
    font-family: 'Fraunces', serif; font-size: 15px; font-weight: 500;
    text-decoration: none; transition: transform 0.3s;
    box-shadow: 0 0 30px rgba(232, 169, 32, 0.3);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary {
    padding: 16px 36px; background: transparent; color: var(--text);
    border: 1px solid var(--border-bright); border-radius: 100px;
    font-family: 'Fraunces', serif; font-size: 15px;
    text-decoration: none; transition: all 0.3s;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

  footer {
    padding: 32px 60px; text-align: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-dim); letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    position: relative; z-index: 1;
  }
  footer a { color: var(--gold); text-decoration: none; }

  @media (max-width: 768px) {
    nav { padding: 16px 24px; }
    main { padding: 40px 24px; }
    footer { padding: 24px; }
  }
</style>
</head>

<nav>

    </div>
    <span>Sou Cifras</span>
  </a>
</nav>

<main>
  <div class="content">
    <div class="musical-rest">
      <span>— Pausa —</span>
    </div>

    <div class="big-number">404</div>

    <h1>Esta nota <span class="italic">não existe.</span></h1>

    <p>A página que você procura saiu do tom. Pode ter sido removida, renomeada ou nunca existiu. Vamos te levar de volta para o ritmo.</p>

    <div class="actions">
      <a href="/" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        </svg>
        Voltar ao início
      </a>
      <a href="/verificacao.html" class="btn-secondary">Verificar certificado</a>
    </div>
  </div>
</main>

<footer>
  <div>© 2026 Sou Cifras · <a href="mailto:contato@soucifras.com.br">contato@soucifras.com.br</a></div>

</html>
